name: Build and Deploy Docker Image
on:
  push:
    branches: [main, master]
  workflow_dispatch:
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/finalgolem:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-hf:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"
          git clone https://caidelta:$HF_TOKEN@huggingface.co/spaces/caidelta/finalgolem hf-space
          rsync -av --exclude='.git' --exclude='hf-space' ./ hf-space/
          cd hf-space
          git add .
          git commit -m "deploy ${{ github.sha }}" || echo "nothing to commit"
          git push
